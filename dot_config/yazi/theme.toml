# ~/.config/yazi/theme.toml
# Use ANSI color names to stay compatible with WezTerm's Light/Dark themes

[manager]
# Active file selection
# 'reset' uses the terminal's default, 'blue' maps to Tokyo Night's blue
hovered         = { fg = "black", bg = "blue", bold = true }
# Selection in the preview column
preview_hovered = { fg = "black", bg = "magenta" }

[border]
# Uses the terminal's predefined bright black (usually a grey)
modifier = { fg = "bright-black" }

[status]
# Status bar - 'reversed' is a great trick for adaptivity
main = { fg = "white", bg = "black" }

[filetype]
# Colors for different file categories using standard names
rules = [
    { mime = "image/*", fg = "cyan" },       # Maps to greenish/cyan in both themes
    { mime = "video/*", fg = "yellow" },     # Maps to orange/yellow
    { mime = "audio/*", fg = "magenta" },    # Maps to pink/purple
    { mime = "application/zip", fg = "red" },# Maps to red
    { mime = "application/x-tar", fg = "red" },
]